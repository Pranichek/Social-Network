{% load static %}

{% for group in group_chat %}
    <div class="block-card" data-chat-id="{{ group.id }}" data-chat-title="{{ group.name }}">
        <img src="{% static 'chat_app/images/alert_conteiner/group-avatar.svg' %}" alt="avatar-icon">

        <div class="text-data">
            <div class="top-data">
                <p class="nickname-card">{{group.name}}</p>

                <p class="card-time">09:41</p>
            </div>

            <div class="bottom-data">
                <p>Привіт</p>
            </div>
        </div>

    </div>
{% endfor %}
