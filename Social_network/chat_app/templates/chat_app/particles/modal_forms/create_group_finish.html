{% load static %}
<form method="post" enctype="multipart/form-data" class="modal-form-create hidden" id = "finish-create">
    <div class="cross-part">
        <img id="close-modals" class="close-modals" src="{% static 'chat_app/images/modals_chat/cross-icon.svg' %}" alt="">
    </div>

    <p class="main-text">Нова група</p>

    <div class="input-data">
        <label for="input">Назва</label>
        <input type="text" placeholder="Введіть назву">
    </div>

    <div class="group-member">
        
        <div class="circle-icon">
            <p>NG</p>
        </div>

        <div class="group-details">

            <div>
                <img src="{% static 'chat_app/images/modals_chat/plus-icon.svg' %}" alt="">
                <button>Додайте фото</button>
            </div>

            <div>
                <img src="{% static 'chat_app/images/modals_chat/img-icon.svg' %}" alt="">
                <button>Оберіть фото</button>
            </div>

        </div>

    </div>

    <div class="members memebers-finish">

        <div class="member-header">
            <p>Учасники</p>
        </div>

        <div class="member-list">

            <div class="member-card">
                <div class="circle-icon card-circle">
                    <p>NG</p>
                </div>
                
                <div class="member-info">
                    <p>Аeslie Alexander</p>

                    <img src="{% static 'chat_app/images/modals_chat/trash-icon.svg' %}" alt="">
                </div>
            </div>
            
            <div class="member-card">
                <div class="circle-icon">
                    <p>NG</p>
                </div>
                
                <div class="member-info">
                    <p>Аeslie Alexander</p>

                    <img src="{% static 'chat_app/images/modals_chat/trash-icon.svg' %}" alt="">
                </div>
            </div>

            <div class="member-card">
                <div class="circle-icon">
                    <img src="{% static 'chat_app/images/modals_chat/avatar.svg' %}" alt="avatar-icon">
                </div>
                
                <div class="member-info">
                    <p>Аeslie Alexander</p>

                    <img src="{% static 'chat_app/images/modals_chat/trash-icon.svg' %}" alt="">
                </div>
            </div>
        </div>

    </div>

    <div class="action-buttons">
        <button type="button" class="first-button change-modal">Назад</button>
        <button type="button" class="second-button" id="close-modals">Створити групу</button>
    </div>
</form>
